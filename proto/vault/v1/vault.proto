syntax = "proto3";

package vault.v1;

option go_package = "github.com/lorem-dev/locksmith/gen/proto/vault/v1;vaultv1";

// VaultProviderService is the gRPC service that every vault plugin must implement.
service VaultProviderService {
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc Info(InfoRequest) returns (InfoResponse);
}

message GetSecretRequest {
  string path = 1;
  map<string, string> opts = 2;
}

message GetSecretResponse {
  bytes secret = 1;
  string content_type = 2;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool available = 1;
  string message = 2;
}

message InfoRequest {}

message InfoResponse {
  string name = 1;
  string version = 2;
  repeated string platforms = 3;
  string min_locksmith_version = 4;  // semver e.g. "1.0.0"; empty = skip check
  string max_locksmith_version = 5;  // semver; empty = no upper bound
}
